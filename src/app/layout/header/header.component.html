<div class="layout-header d-flex justify-content-end" >

    <div class="menu-list d-flex flex-1">
        <div>
          <app-menu [items]="menuItems" label="Меню"></app-menu>
        </div>
        
    </div>

    <div class="time-wrap">
      {{date | date:"HH:mm:ss EEEE"}}
    </div>


   
    <div class="user-info-wrap">
        <span *ngIf="userLogin">
          {{ userLogin }}
        </span>
    </div>

    <header class="header">
    
      <button mat-button color="primary" (click)="logout()">
        Выйти
      </button>
    </header>

</div>
