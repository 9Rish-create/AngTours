<div class="d-flex flex-column authorization-wrap mt-3 ">
    <p>Ваш логин {{login}}</p>
    <div>
        <input placeholder="Логин" 
        [ngClass]="{'input-error': login.length < 3}"
        [(ngModel)]="login"/>
    </div>

    <div>
        <input type="password" placeholder="Пароль"
        [ngClass]="{'input-error': !password || password.length < 6}"
        [(ngModel)]="password"/>
    </div>
</div>

<div class="mt-3">
    <mat-checkbox [disableRipple]="true" [(ngModel)]="saveInStore">Сохранить пользователя в хранилище!</mat-checkbox>
</div>

<div class="mt-3 d-flex justify-content-center">
    <button 
    mat-flat-button 
    (click)="onAuth($event)"
    [disabled]="login.length < 3 || password.length < 6">
        Авторизоваться
    </button>
</div>
