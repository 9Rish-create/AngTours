
    <div class="d-flex flex-column mt-3">
        <p>Ваш логин {{login}}</p>
        <div>
            <input placeholder="Логин" 
            [ngClass]="{'input-error': login.length < 3}"
            [(ngModel)]="login"/>
        </div>

        <div class="mt-3">
            <input type="email" placeholder="Почта"
            [(ngModel)]="email"/>
        </div>

        <div class="mt-3">
            <input type="password" placeholder="Пароль"
            [ngClass]="{'input-error': !password || password.length < 6}"
            [(ngModel)]="password"/>
        </div>

        <div class="mt-3">
            <input type="password" placeholder="Повтор пароля"
            [ngClass]="{'input-error': passwordRepeat !== password}"
            [(ngModel)]="passwordRepeat"/>
        </div>
    </div>

    <div class="mt-3 d-flex justify-content-center">
        <button 
        mat-flat-button 
        (click)="onAuth($event)"
        [disabled]="login.length < 3 || password.length < 6 || password !== passwordRepeat">
            Зарегистрироваться
        </button>
    </div>
